# ─────────────────────────────────────────────────────────────────────────────
# Computer-use app launch registry (data-driven; see app_registry.py).
#
# Maps a friendly app name (what the planner / model emits in a `launch` action,
# or NodeSpec metadata.app) to how cua-driver's `launch_app` tool should start it.
# To teach the agent a new app, add an entry — no Python change. Names not found
# here fall through and are launched by `name` (driver tries the Start-Menu
# AppsFolder index, then a PATH search), so `notepad`, `calc`, etc. still work
# without an entry.
#
# Per-app fields (choose ONE launch field):
#   name          A display name / PATH command, e.g. `code`, `notepad`. Most
#                 portable — survives install-location changes.
#   path          Full path to an .exe (use when it isn't on PATH / AppsFolder).
#   aumid         App User Model ID for a packaged/Store app — REQUIRED on Win11
#                 for built-ins (Calculator, Notepad, Paint) whose System32 .exe
#                 is a stub that exits immediately. Returns the real packaged pid.
#   (target)      Back-compat: classified as `path` if it looks like a path, else
#                 `name`.
#
#   window_title  Substring used to recover the window after a stub launch and to
#                 find/front it. Defaults to the entry key.
#   aliases       Extra names that resolve here (case-insensitive, space-collapsed).
# ─────────────────────────────────────────────────────────────────────────────
apps:
  calculator:
    aumid: Microsoft.WindowsCalculator_8wekyb3d8bbwe!App
    aliases: [calc, calculator]
    window_title: Calculator

  notepad:
    aumid: Microsoft.WindowsNotepad_8wekyb3d8bbwe!App
    aliases: [note pad]
    window_title: Notepad

  vscode:
    # The `code` PATH shim resolves to the real install wherever it lives; an
    # absolute Code.exe path is brittle (it moved once already, see #20).
    name: code
    aliases: [vs code, visual studio code, code]
    window_title: Visual Studio Code

  excel:
    path: C:\Program Files\Microsoft Office\root\Office16\EXCEL.EXE
    aliases: [ms excel, microsoft excel, xlsx]
    window_title: Excel

  canva:
    path: C:\Users\gayad\AppData\Local\Programs\Canva\Canva.exe
    aliases: [canva app]
    window_title: Canva

  # ── add more apps below following the same shape ──
